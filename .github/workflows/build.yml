name: build-bun
on:
  pull_request:
    branches:
    - main
  push:
    branches: 
      - main
      - opt*
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        # You may pin to the exact commit or the version.
        # uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        uses: oven-sh/setup-bun@v2.2.0
      - name: build
        run: |
          bun install
          bun run build
              
